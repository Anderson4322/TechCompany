<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pai">
        <header>
            <h1>Bem vindo ao sistema TechCompany </h1> 
            <h5></h5>
            <button id="sair">Sair</button>

        </header>

        <form id="formulario">
            
                <legend>Faça seu cadastro para solicitar um serviço</legend>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required placeholder="Digite seu nome completo">
                <label for="descricao">Descrição:</label>
                <input type="text" id="descricao" required placeholder="Digite seu email">
                <label for="modelo">Modelo:</label>
                <input type="text" id="tipoeletronico" required placeholder="Digite sua senha">
                <label for="tipoeletronico">Tipo de Eletrônico:</label>
                <select required>
                    <option value="">Selecione o modelo do eletrônico</option>
                    <option value="smartphone">Smartphone</option>
                    <option value="notebook">Computador</option>
                    <option value="tablet">Console</option>
                </select>
                <label for="valor">Valor:</label>
                <input type="tel" id="valor" required placeholder="Digite o valor do serviço">
                <button type="submit" id="confirmar">Confirmar</button>

              
           
        </form>

        <div id="vazia">
          
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
